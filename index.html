<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Bingo Word Randomizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main">
    <h1 id="title">Ввод слов для игры</h1>
    <label for="langSelect">Язык:</label>
    <select id="langSelect">
      <option value="ru">Русский</option>
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="de">Deutsch</option>
    </select>

    <textarea id="wordsInput" rows="8" cols="40" placeholder="Введите слова, по одному на строке"></textarea>
    <button id="startBtn">Начать игру</button>
  </div>
  <div id="game" style="display:none;">
    <h1 id="gameTitle">Случайное слово:</h1>
    <div id="wordDisplay"></div>
    <button id="nextWordBtn">Следующее слово</button>
    <button id="restartBtn">Начать заново</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
